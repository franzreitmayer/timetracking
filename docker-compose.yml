services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zeiterfassung
      POSTGRES_USER: zeit
      POSTGRES_PASSWORD: zeit
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeit -d zeiterfassung"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: zeiterfassung
      DB_USER: zeit
      DB_PASSWORD: zeit
      JWT_SECRET: change-this-secret-in-production
      PORT: 3001
      UPLOAD_DIR: /uploads
      MIGRATIONS_DIR: /migrations
    volumes:
      - uploads:/uploads
      - ./migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
